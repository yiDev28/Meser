<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Cargando Tavlo</title>
    <style>
      body {
        background: #1e1e1e;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 4px solid #ffffff33;
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 10px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loader"></div>
    <div id="status">Inicializando...</div>

    <script>
      window.splashAPI?.onStatusUpdate((msg) => {
        document.getElementById("status").textContent = msg;
      });
    </script>
  </body>
</html>
