<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Impresión de Factura</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 80mm;
      margin: 0;
      padding: 5mm;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.3;
    }
    .center { text-align: center; }
    .bold { font-weight: bold; }
    .item-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .text-right { text-align: right; }
    .divider { border-top: 1px dashed #000; margin: 5px 0; }
    .item-row td { padding: 2px 0; }
    .footer { margin-top: 15px; }
  </style>
</head>
<body>
  <div class="center">
    <h2 class="bold" id="clientName">CARGANDO...</h2>
  </div>
  
  <div class="divider"></div>
  <p>Factura: <span id="invoiceNumber">-</span></p>
  <p>Fecha: <span id="invoiceDate">-</span></p>
  <p>Tipo: <span id="orderType">-</span></p>
  <div class="divider"></div>

  <table class="item-table">
    <thead>
      <tr>
        <th align="left">Cant</th>
        <th align="left">Producto</th>
        <th align="right">Total</th>
      </tr>
    </thead>
    <tbody id="items-body">
      <tr><td colspan="3">Cargando items...</td></tr>
    </tbody>
  </table>

  <div class="divider"></div>
  <div class="text-right">
    <p>Subtotal: <span id="subtotal">$0</span></p>
    <p>Impuesto: <span id="tax">$0</span></p>
    <p class="bold">TOTAL: <span id="total">$0</span></p>
  </div>
  <div class="divider"></div>
  <p class="text-right">Método de pago: <span id="paymentMethod">-</span></p>
  
  <div class="center footer">
    <p>¡Gracias por su compra!</p>
    <p>Vuelva pronto</p>
  </div>

  <script>
    function formatCurrency(value) {
      return '$' + Number(value).toLocaleString('es-CO');
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('es-CO', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderInvoice(data) {
      if (!data) {
        console.error('No hay datos para renderizar');
        document.getElementById('clientName').textContent = 'ERROR: Sin datos';
        return;
      }
      
      document.getElementById('clientName').textContent = data.clientName || 'Restaurante';
      document.getElementById('invoiceNumber').textContent = data.number || '-';
      document.getElementById('invoiceDate').textContent = formatDate(data.createdAt);
      document.getElementById('orderType').textContent = data.orderTypeName || '-';
      document.getElementById('paymentMethod').textContent = data.paymentMethodName || '-';
      
      document.getElementById('subtotal').textContent = formatCurrency(data.subtotal);
      document.getElementById('tax').textContent = formatCurrency(data.tax);
      document.getElementById('total').textContent = formatCurrency(data.total);

      var tbody = document.getElementById('items-body');
      tbody.innerHTML = '';
      
      if (data.items && data.items.length > 0) {
        data.items.forEach(function(item) {
          var tr = document.createElement('tr');
          tr.className = 'item-row';
          tr.innerHTML = 
            '<td>' + item.quantity + '</td>' +
            '<td>' + (item.description || 'Producto') + '</td>' +
            '<td class="text-right">' + formatCurrency(item.total) + '</td>';
          tbody.appendChild(tr);
        });
      } else {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="3" class="center">Sin items</td>';
        tbody.appendChild(tr);
      }
      
      console.log('Factura renderizada correctamente');
    }

    // Los datos se pasan directamente desde window.invoiceData
    if (window.invoiceData) {
      console.log('Datos encontrados en window.invoiceData');
      renderInvoice(window.invoiceData);
    } else {
      console.log('Esperando datos...');
      // Esperar un poco más
      setTimeout(function() {
        if (window.invoiceData) {
          renderInvoice(window.invoiceData);
        } else {
          document.getElementById('clientName').textContent = 'ERROR: No se recibieron datos';
          console.log('No se recibieron datos de la factura');
        }
      }, 2000);
    }
  </script>
</body>
</html>
